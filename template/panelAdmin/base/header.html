<!-- templates/admin/base/header.html -->
{% load static %}
<nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm" dir="rtl">
    <div class="container-fluid">
        <!-- Sidebar Toggle Button -->
        <button class="btn btn-outline-secondary me-2"
                onclick="toggleSidebar()"
                aria-label="تغییر وضعیت منو"
                title="باز و بسته کردن منو">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Brand -->
        <a class="navbar-brand fw-bold" href="{% url 'panelAdmin:admin_dashboard' %}">
            <i class="fas fa-crown text-warning ms-2"></i>
            <span class="bg-gradient-primary bg-clip-text text-transparent">پنل مدیریت</span>
        </a>

        <!-- Search (Hidden on mobile) -->
      

        <!-- Right Side Actions -->
        <div class="d-flex align-items-center gap-2 gap-lg-3">

            <!-- Notifications -->


            <!-- Messages -->

            <!-- User Dropdown -->
            <div class="dropdown">
                <button class="btn btn-light d-flex align-items-center gap-2 py-1 ps-1 pe-3 border-0 hover-bg-light"
                        type="button"
                        id="userDropdown"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                    <div class="position-relative">
                        <img src="https://ui-avatars.com/api/?name={{ user.get_full_name|default:user.mobileNumber }}&background=0D6EFD&color=fff&size=35&bold=true"
                             class="rounded-circle border border-2 border-white"
                             width="35"
                             height="35"
                             alt="{{ user.get_full_name|default:user.mobileNumber }}">
                        <span class="position-absolute bottom-0 end-0 bg-success border border-2 border-white rounded-circle p-1"></span>
                    </div>
                    <span class="d-none d-md-block">
                        {{ user.get_full_name|default:user.mobileNumber|truncatechars:15 }}
                    </span>
                    <i class="fas fa-chevron-down small text-muted"></i>
                </button>

                <div class="dropdown-menu dropdown-menu-end shadow-lg py-2" style="min-width: 240px;">
                    <!-- User Info -->
                    <div class="px-3 py-2 border-bottom mb-2">
                        <p class="fw-bold mb-0">{{ user.get_full_name|default:"کاربر" }}</p>
                        <small class="text-muted">{{ user.mobileNumber }}</small>
                    </div>

                    <a class="dropdown-item py-2" href="#">
                        <i class="fas fa-user ms-2 text-muted" style="width: 20px;"></i>
                        پروفایل من
                    </a>
                    <a class="dropdown-item py-2" href="#">
                        <i class="fas fa-cog ms-2 text-muted" style="width: 20px;"></i>
                        تنظیمات حساب
                    </a>
                    <a class="dropdown-item py-2" href="#">
                        <i class="fas fa-shield-alt ms-2 text-muted" style="width: 20px;"></i>
                        امنیت
                    </a>

                    <div class="dropdown-divider"></div>

                    <a class="dropdown-item py-2 text-danger" href="">
                        <i class="fas fa-sign-out-alt ms-2" style="width: 20px;"></i>
                        خروج از حساب
                    </a>
                </div>
            </div>
        </div>
    </div>
</nav>

<style>
/* Custom styles for admin header */
.navbar {
    padding: 0.5rem 1rem;
    z-index: 1030;
}

.bg-gradient-primary {
    background: linear-gradient(45deg, #0d6efd, #0b5ed7);
}

.bg-clip-text {
    -webkit-background-clip: text;
    background-clip: text;
}

.text-transparent {
    color: transparent;
}

.hover-bg-light:hover {
    background-color: rgba(0,0,0,0.05) !important;
}

/* Search animation */
.search-container {
    transition: all 0.3s ease;
}

.search-container input:focus {
    width: 350px !important;
    box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
    border-color: #0d6efd;
}

/* Dropdown animations */
.dropdown-menu {
    display: block;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.2s ease;
}

.dropdown-menu.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

/* Notification hover effects */
.dropdown-item {
    transition: background-color 0.2s ease;
}

.dropdown-item:hover {
    background-color: #f8f9fa;
}

/* Badge pulse animation */
@keyframes pulse {
    0% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.1);
    }
    100% {
        transform: scale(1);
    }
}

.badge-pulse {
    animation: pulse 2s infinite;
}

/* RTL specific adjustments */
[dir="rtl"] .me-auto {
    margin-right: auto !important;
    margin-left: 0 !important;
}

[dir="rtl"] .ms-3 {
    margin-right: 1rem !important;
    margin-left: 0 !important;
}

[dir="rtl"] .ps-5 {
    padding-right: 3rem !important;
    padding-left: 1rem !important;
}
</style>

<script>
// Optional: Add dynamic notification handling
document.addEventListener('DOMContentLoaded', function() {
    // Handle dropdown auto-hide on click outside
    const dropdowns = document.querySelectorAll('.dropdown');
    dropdowns.forEach(dropdown => {
        dropdown.addEventListener('hide.bs.dropdown', function() {
            // Optional: Add any cleanup logic
        });
    });
});
</script>
